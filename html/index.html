<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wolfy Ban System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        #banList::-webkit-scrollbar {
            background-color: rgba(0, 0, 0, 0.356);
            border-radius: 2vh;
            width: 0.5vw;
        }

        #banList::-webkit-scrollbar-thumb {
            background-color: rgb(166, 166, 166);
            border-radius: 1vh;
        }

        #content::-webkit-scrollbar {
            background-color: rgba(0, 0, 0, 0.356);
            border-radius: 2vh;
            width: 0.5vw;
        }

        #content::-webkit-scrollbar-thumb {
            background-color: rgb(88, 80, 80);
            border-radius: 1vh;
        }
    </style>
</head>

<body class="w-screen h-screen hidden justify-center items-center">
    <div id="container" class=" w-[60vw] h-[75vh] bg-zinc-950/90 rounded-lg shadow-2xl shadow-black/50 flex">
        <div class="w-[25%] h-full border-r-[0.1vw] border-r-white">
            <p
                class="uppercase font-bold text-white flex justify-center items-center ml-5 mr-5 h-[8%] pt-[1vh] text-[1.7vw] italic select-none  text-nowrap border-b-[0.2vh] border-b-white">
                Ban List</p>
            <input id="search" type="text" placeholder="Keresés..."
                class="ml-[7%] mt-[3%] text-[1vw] h-[4.5%] rounded-[0.2vw] w-[85%] px-3 bg-gray-200/90 text-black placeholder-gray-500 border border-white/20 focus:outline-none focus:ring-2 focus:ring-cyan-200 focus:border-transparent shadow-sm">
            <div id="banList" class="mt-[0.5vh] h-[84%] w-full flex flex-col items-center overflow-y-auto gap-4 py-2">
                <div
                    class="ban-item w-[85%] flex items-center gap-3 bg-zinc-700 hover:bg-zinc-600 border border-white/5 rounded-lg h-[3.5vw] px-[1vw] cursor-pointer transition-colors">
                    <div
                        class="w-[2vw] h-[4vh] rounded-full bg-blue-900 flex items-center justify-center text-purple-200 text-xs font-medium flex-shrink-0">

                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-[0.85vw] font-medium text-white truncate m-0 select-none">Lynxxx</p>
                        <p class="text-[0.65vw] text-zinc-400 m-0 select-none">Lejár: <span>2025-05-22</span></p>
                    </div>
                    <span class="text-[0.6vw] px-2 py-0.5 rounded-full bg-green-900 text-green-300">Temp</span>
                </div>


            </div>
        </div>
        <div id="content" class="flex-1 p-[2vw] overflow-y-auto">
            <div class="flex justify-between items-center mb-[3vh]">
                <h1 id="banName" class="text-white font-bold text-[2.5vw] tracking-tight select-none">Betöltés...</h1>
                <button id="unbanbtn"
                    class="bg-red-600 hover:bg-red-700 text-white font-bold py-[1vh] px-[2vw] rounded-md transition-all duration-300 shadow-lg shadow-red-900/20 uppercase text-[0.8vw]">
                    <i class="fa-solid fa-unlock-keyhole mr-2"></i> Unban
                </button>
            </div>

            <div class="grid grid-cols-2 gap-[1.5vw]">

                <div class="bg-zinc-900/80 p-[1.5vw] rounded-xl border border-white/5 shadow-2xl">
                    <h2 class="text-white font-bold uppercase text-[0.7vw] mb-[1vh] tracking-widest select-none">Kitiltás indoka
                    </h2>
                    <p id="banReason" class="text-zinc-200 text-[0.9vw] leading-relaxed">
                        Betöltés...
                    </p>
                </div>

                <div class="bg-zinc-900/80 p-[1.5vw] rounded-xl border border-white/5 shadow-2xl">
                    <h2 class="text-white font-bold uppercase text-[0.7vw] mb-[1.5vh] tracking-widest select-none">Kitiltás
                        adatai</h2>
                    <div class="space-y-[1.2vh] text-[0.85vw]">
                        <p class="text-zinc-400 flex justify-between items-center">
                            <span class="select-none"><i class="fa-solid fa-shield w-6 text-blue-500"></i> Admin:</span>
                            <span id="bannedby" class="text-white font-medium">Betöltés...</span>
                        </p>
                        <p class="text-zinc-400 flex justify-between items-center">
                            <span class="select-none"><i class="fa-solid fa-ban w-6 text-blue-500 "></i> Ban ID:</span>
                            <span id="banId" class="text-blue-400 font-mono">Betöltés...</span>
                        </p>
                        <p class="text-zinc-400 flex justify-between items-center">
                            <span class="select-none"><i class="fa-solid fa-clock w-6 text-blue-500 "></i> Lejárat:</span>
                            <span id="banTime" class="text-white">Betöltés...</span>
                        </p>
                    </div>
                </div>

                <div class="bg-zinc-900/80 p-[1.5vw] rounded-xl border border-white/5 shadow-2xl col-span-2">
                    <h2 class="text-white font-bold uppercase text-[0.7vw] mb-[1.5vh] tracking-widest select-none">Azonosítók
                    </h2>
                    <div class="space-y-[1.2vh] text-[0.85vw]">
                        <p class="text-zinc-400 flex justify-between items-center">
                            <span class="select-none"><i class="fa-solid fa-id-card w-6 text-blue-500"></i> License:</span>
                            <span id="licenseidentifier"
                                class="text-white bg-zinc-800 px-2 py-1 rounded blur-sm hover:blur-none transition-all">Betöltés...</span>
                        </p>
                        <p class="text-zinc-400 flex justify-between items-center">
                            <span class="select-none"><i class="fa-brands fa-discord w-6 text-blue-500 "></i> Discord:</span>
                            <span id="discordidentifier"
                                class="text-white bg-zinc-800 px-2 py-1 rounded blur-sm hover:blur-none transition-all">Betöltés...</span>
                        </p>
                        <p class="text-zinc-400 flex justify-between items-center">
                            <span class="select-none"><i class="fa-solid fa-network-wired w-6 text-blue-500 "></i> IP:</span>
                            <span id="ipidentifier"
                                class="text-white bg-zinc-800 px-2 py-1 rounded blur-sm hover:blur-none transition-all">Betöltés...</span>
                        </p>
                        <p class="text-zinc-400 flex justify-between items-center">
                            <span class="select-none"><i class="fa-solid fa-gamepad w-6 text-blue-500"></i> Fivem:</span>
                            <span id="fivemidentifier"
                                class="text-white bg-zinc-800 px-2 py-1 rounded blur-sm hover:blur-none transition-all">Betöltés...</span>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
